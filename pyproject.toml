[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "audio-genre-classifier"
version = "1.0.0"
requires-python = ">=3.11,<3.12"
dependencies = [
    "streamlit==1.32.0",
    "torch==2.0.1",
    "librosa==0.10.0",
    "transformers==4.34.0",
    "soundfile==0.12.1",
    "huggingface-hub==0.17.3",
    "numpy==1.24.3",
]
